global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Ray cluster metrics (Prometheus endpoint on Jupiter head node, port 44217)
  - job_name: 'ray'
    static_configs:
      - targets: ['192.168.0.108:44217']
    metrics_path: '/metrics'
    scrape_timeout: 10s

  # QCC daemon health
  - job_name: 'qcc'
    static_configs:
      - targets: ['localhost:3456']
    metrics_path: '/api/health'
    scrape_timeout: 5s
